<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 56" width="120" height="56" role="img" aria-label="Command plus 2">
  <style>
    .key { fill: #f5f5f5; stroke: #1a1a1a; stroke-width: 1.25; }
    .label { font-family: -apple-system, BlinkMacSystemFont, "SF Pro", system-ui, sans-serif; font-size: 18px; font-weight: 500; fill: #1a1a1a; text-anchor: middle; dominant-baseline: middle; }
    .plus { font-family: -apple-system, BlinkMacSystemFont, "SF Pro", system-ui, sans-serif; font-size: 14px; fill: #555; text-anchor: middle; dominant-baseline: middle; }
    @media (prefers-color-scheme: dark) {
      .key { fill: #2a2a2a; stroke: #f0f0f0; }
      .label { fill: #f0f0f0; }
      .plus { fill: #a8a8a8; }
    }
  </style>
  <rect class="key" x="4" y="8" width="48" height="40" rx="6" ry="6"/>
  <text class="label" x="28" y="30">⌘</text>
  <text class="plus" x="60" y="30">+</text>
  <rect class="key" x="68" y="8" width="48" height="40" rx="6" ry="6"/>
  <text class="label" x="92" y="30">2</text>
</svg>
