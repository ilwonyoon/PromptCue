name: PromptCue
options:
  bundleIdPrefix: com.promptcue
  defaultConfig: Debug
  deploymentTarget:
    macOS: "14.0"
configs:
  Debug: debug
  DevSigned: debug
  Release: release
  AppStore: release
configFiles:
  Debug: Config/Debug.xcconfig
  DevSigned: Config/DevSigned.xcconfig
  Release: Config/Release.xcconfig
  AppStore: Config/AppStore.xcconfig
settings:
  base:
    SWIFT_VERSION: 5.0
fileGroups:
  - Config
schemes:
  PromptCue:
    build:
      targets:
        PromptCue: all
        PromptCueTests: [test]
    run:
      config: DevSigned
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: PromptCueTests
    archive:
      config: AppStore
packages:
  PromptCueCore:
    path: .
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    exactVersion: 7.8.0
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts.git
    exactVersion: 2.3.0
targets:
  PromptCue:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: PromptCue
    postBuildScripts:
      - name: Bundle BacktickMCP Helper
        basedOnDependencyAnalysis: false
        inputFiles:
          - $(SRCROOT)/Package.swift
          - $(SRCROOT)/Package.resolved
          - $(SRCROOT)/scripts/build_backtick_mcp_helper.sh
          - $(SRCROOT)/scripts/verify_backtick_mcp_helper.sh
          - $(SRCROOT)/Sources/BacktickMCP
          - $(SRCROOT)/Sources/BacktickMCPServer
          - $(SRCROOT)/Sources/PromptCueCore
          - $(SRCROOT)/PromptCue/Services
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Helpers/BacktickMCP
        script: |
          /bin/sh "${SRCROOT}/scripts/build_backtick_mcp_helper.sh"
      - path: scripts/sign_dev_app.sh
        name: Sign Dev App
        basedOnDependencyAnalysis: true
        inputFiles:
          - $(SRCROOT)/scripts/sign_dev_app.sh
          - $(SRCROOT)/Config/Local.xcconfig
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/MacOS/$(PRODUCT_NAME)
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Helpers/BacktickMCP
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/_CodeSignature/CodeResources
        showEnvVars: false
    dependencies:
      - package: PromptCueCore
        product: PromptCueCore
      - package: GRDB
        product: GRDB
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.promptcue.promptcue
        PRODUCT_NAME: Prompt Cue
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Prompt Cue
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHighResolutionCapable: YES
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
      configs:
        Release:
          PROVISIONING_PROFILE_SPECIFIER: Backtick Developer ID
  PromptCueTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: PromptCueTests
    dependencies:
      - target: PromptCue
      - package: PromptCueCore
        product: PromptCueCore
      - package: GRDB
        product: GRDB
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.promptcue.promptcue.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Prompt Cue.app/Contents/MacOS/Prompt Cue"
        BUNDLE_LOADER: "$(TEST_HOST)"
